name: CI Compilation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Autorise le push automatique des commits par GitHub Actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repository URL for forks dynamically
        run: |
          CURRENT_REPO="${{ github.repository }}"
          echo "Current Repository detected: $CURRENT_REPO"
          
          # Remplace l'URL du dépôt parent par celle du dépôt actuel (fork) dans le fichier source
          sed -i "s|aptitek/aptispace-datascience-projet|$CURRENT_REPO|g" report/rapport.qmd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Go-Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Compile Notebooks and Render Quarto Report
        run: |
          task render
          task install-guide

      - name: Commit and push compiled files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ajout forcé des fichiers compilés / générés par les tâches
          for file in README.md INSTALL.md src/0*_*.py logs/*.log report/notebooks/*.qmd report/rapport.html report/rapport.pdf report/rapport.qmd; do
            [ -e "$file" ] && git add -f "$file"
          done
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto: Update compiled outputs (README, INSTALL, scripts, includes and logs) [skip ci]"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          else
            echo "Aucune modification à commiter."
          fi
