name: CI Compilation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Autorise le push automatique des commits par GitHub Actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repository URL for forks dynamically
        run: |
          CURRENT_REPO="${{ github.repository }}"
          echo "Current Repository detected: $CURRENT_REPO"
          
          # Remplace l'URL du dépôt parent par celle du dépôt actuel (fork) dans le fichier source
          sed -i "s|aptitek/aptispace-datascience-projet|$CURRENT_REPO|g" report/rapport.qmd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Go-Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Compile Notebooks and Render Quarto Report
        run: |
          task render
          task install-guide

      - name: Create or Update GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force update tag 'latest' locally and push it
          git tag -f latest
          git push -f origin latest
          
          # Prepare the GFM report as README.md in the release assets
          cp build/report/rapport.md build/report/README.md
          
          # Delete the old release if it exists
          gh release delete latest --yes || true
          
          # Create new rolling release with all assets
          gh release create latest \
            build/report/rapport.pdf \
            build/report/rapport.html \
            build/report/README.md \
            build/logs.zip \
            build/sources.zip \
            --title "Dernière Compilation (Automatique)" \
            --notes "Rapports et codes compilés automatiquement par le pipeline CI à partir du commit ${{ github.sha }}."
