version: '3'

tasks:
  default:
    desc: Lance la compilation des notebooks et le rendu complet du rapport (HTML, PDF, GFM README.md)
    cmds:
      - task: render

  compile:
    desc: "Compile les notebooks (.ipynb) en 3 fichiers : .qmd (Quarto), .py (Script), .log (Journal d'exécution)"
    cmds:
      - python3 tools/compile_notebooks.py
      - python3 tools/compile_ojs_in_markdown.py build/report/rapport.md

  render:
    desc: Compile d'abord les notebooks puis génère le rapport complet dans tous les formats déclarés
    cmds:
      - task: compile
      - quarto render report/slides.qmd
      - quarto render report/rapport.qmd
      - python3 tools/compile_ojs_in_markdown.py build/report/rapport.md
      - rm -rf report/slides_files/ report/rapport_files/ report/installation_files/
      - task: zip

  html:
    desc: Compile les notebooks puis génère le rapport au format HTML uniquement
    cmds:
      - task: compile
      - quarto render report/rapport.qmd --to html
      - rm -rf report/slides_files/ report/rapport_files/ report/installation_files/

  pdf:
    desc: Compile les notebooks puis génère le rapport au format PDF (via Typst) uniquement
    cmds:
      - task: compile
      - quarto render report/rapport.qmd --to typst
      - rm -rf report/slides_files/ report/rapport_files/ report/installation_files/

  gfm:
    desc: Compile les notebooks puis génère le rapport en GFM (Markdown) uniquement
    cmds:
      - task: compile
      - quarto render report/rapport.qmd --to gfm
      - python3 tools/compile_ojs_in_markdown.py build/report/rapport.md
      - rm -rf report/slides_files/ report/rapport_files/ report/installation_files/

  zip:
    desc: Compresse les logs et les scripts sources compilés en fichiers ZIP dans le dossier build
    cmds:
      - (cd build && zip -r logs.zip logs)
      - (cd build && zip -r sources.zip src)

  preview:
    desc: Compile les notebooks puis démarre le serveur de prévisualisation dynamique Quarto
    cmds:
      - task: compile
      - quarto preview report/rapport.qmd

  install-guide:
    desc: Génère le guide d'installation sous tous les formats (HTML, PDF, Markdown) et met à jour INSTALL.md à la racine
    cmds:
      - quarto render report/installation.qmd
      - rm -rf report/slides_files/ report/rapport_files/ report/installation_files/
      - cp build/report/INSTALL.md ./INSTALL.md

  clean:
    desc: "Nettoie tous les fichiers temporaires de compilation, le dossier build et les ressources Quarto (conserve le PDF du rapport)"
    cmds:
      - rm -rf build/
      - rm -f report/slides.html
      - rm -rf report/slides_files/
      - rm -f report/rapport.html
      - rm -f report/rapport.md
      - rm -rf report/rapport_files/
      - rm -f report/installation.html
      - rm -f report/installation.pdf
      - rm -rf report/installation_files/
      - rm -rf report/.quarto_libs/


